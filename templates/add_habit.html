{% extends "layout.html" %}
{% block title %}Add Habit{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Add New Habit</h2>
    <form action="/add_habit" method="POST" class="habit-form">
        <div class="form-group">
            <label for="name">Habit Name *</label>
            <input type="text" id="name" name="name" required 
                   placeholder="e.g., Morning Exercise, Read for 30 mins">
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="3"
                      placeholder="Why do you want to build this habit?"></textarea>
        </div>

        <div class="form-group">
            <label for="frequency">Frequency</label>
            <select id="frequency" name="frequency">
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
            </select>
        </div>

        <div class="form-group">
            <label for="target_count">Target Count</label>
            <input type="number" id="target_count" name="target_count" 
                   min="1" value="1">
        </div>

        <div class="form-group">
            <label for="color">Color Theme</label>
            <div class="color-picker">
                <input type="color" id="color" name="color" value="#4CAF50">
                <span class="color-preview"></span>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create Habit</button>
            <a href="/" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
